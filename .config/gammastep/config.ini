; gammastep — Wayland night-light (redshift fork for wlroots compositors like dwl)
; Wayland counterpart to ../redshift.conf, which stays X11-only (adjustment-method=randr).
; Docs: man 5 gammastep
[general]
temp-day=6500
temp-night=2000
; smooth fade between temperatures (redshift's `transition`)
fade=1
brightness-day=1.0
brightness-night=0.85
gamma=1.0
; wayland gamma-control (wlr-gamma-control); dwl/Hyprland/Sway support this
adjustment-method=wayland
location-provider=manual

[manual]
lat=38.895
lon=-77.036
