# foot configuration — translated from ~/.config/alacritty/alacritty.toml
# Reference: man 5 foot.ini

[main]
# Mirrors alacritty's `general.import` of the current Omarchy theme.
# The theme ships a foot.ini (colors); foot errors if this file is missing.
include=~/.config/omarchy/current/theme/foot.ini
term=xterm-256color
# alacritty used CaskaydiaMono Nerd Font (Regular/Bold/Italic) at size 9.
# foot auto-derives the bold/italic variants from the same family.
font=CaskaydiaMono Nerd Font:size=9
pad=14x14
initial-window-mode=windowed
# alacritty had decorations="None"; foot draws no server-side titlebar under
# Hyprland, so this needs no extra setting to match.

[key-bindings]
# F11 -> fullscreen (alacritty: ToggleFullscreen)
fullscreen=F11
# Copy: foot's default Control+Shift+c, plus alacritty's Control+Insert and the
# macOS-style Super+C / Super+X fallbacks (Super = Mod4). Control+Shift+c is kept
# because macos-key.sh sends it to terminals for copy.
clipboard-copy=Control+Shift+c Control+Insert Mod4+c Mod4+x
# Paste: foot's default Control+Shift+v, plus alacritty's Shift+Insert and Super+V.
clipboard-paste=Control+Shift+v Shift+Insert Mod4+v
# Shift+Insert is reassigned to clipboard paste above; disable the default
# keyboard primary-paste so the bindings don't clash (foot rejects duplicates).
# Middle-click primary paste is a mouse binding and is unaffected.
primary-paste=none
