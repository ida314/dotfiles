# keyd: macOS-style Command key for dwl (replaces the old Hyprland macos-key.sh).
#
# Remaps Command (meta/Super) + <letter> to Ctrl + <letter> for the common
# editing/app shortcuts, so Cmd+C/V/X/A/Z/etc. work like macOS in GUI apps.
# This is surgical: the meta key still works as a plain Super modifier for any
# key not listed here, and the physical Ctrl key is untouched.
#
# Works at the evdev level, so it is compositor-agnostic and needs no changes
# in dwl. dwl's own MODKEY is Alt, so there is no conflict with these bindings.
#
# Terminal note (foot): Cmd+C -> Ctrl+C is interrupt (SIGINT), exactly as on a
# normal Linux terminal. Copy/paste in the terminal is Cmd+Shift+C / Cmd+Shift+V
# (= Ctrl+Shift+C/V, foot's default) — same behavior the old script gave.
#
# Install: sudo cp this file to /etc/keyd/default.conf then
#          sudo systemctl restart keyd

[ids]
*

[meta]
a = C(a)
c = C(c)
f = C(f)
g = C(g)
l = C(l)
n = C(n)
o = C(o)
p = C(p)
q = C(q)
r = C(r)
s = C(s)
t = C(t)
v = C(v)
w = C(w)
x = C(x)
y = C(y)
z = C(z)
